<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Calculadora Lucas Machado 00</h1>
    <div id="calculator">
        <form method="POST" action="{{ url_for('index') }}">
            <div class="form-grupo">
                <label for="num1">Primeiro número (ou 'a')</label>
                <input type="number" id="num1" name="num1" step="any" required value="{{ request.form.get('num1', '') }}">
            </div>
            
            <div class="form-grupo">
                <label for="operacao">Operação</label>
                {% set op = request.form.get('operacao', '+') %}
                <select id="operacao" name="operacao" required onchange="atualizarFormulario()">
                    <option value="+" {% if op == '+' %}selected{% endif %}>+ Somar</option>
                    <option value="-" {% if op == '-' %}selected{% endif %}>- Subtrair</option>
                    <option value="*" {% if op == '*' %}selected{% endif %}>* Multiplicar</option>
                    <option value="/" {% if op == '/' %}selected{% endif %}>/ Dividir</option>
                    <option value="**" {% if op == '**' %}selected{% endif %}>^ Potência</option>
                    <option value="sqrt" {% if op == 'sqrt' %}selected{% endif %}>√ Raiz quadrada</option>
                    <option value="log" {% if op == 'log' %}selected{% endif %}>Logaritmo (num2 = base)</option>
                    <option value="bhaskara" {% if op == 'bhaskara' %}selected{% endif %}>Fórmula de Bhaskara</option>
                </select>
            </div>
            
            <div class="form-grupo" id="grupo-num2">
                <label for="num2">Segundo número (ou 'b' / base)</label>
                <input type="number" id="num2" name="num2" step="any" value="{{ request.form.get('num2', '') }}">
            </div>

            <div class="form-grupo" id="grupo-num3" style="display: none;">
                <label for="num3">Terceiro número (ou 'c')</label>
                <input type="number" id="num3" name="num3" step="any" value="{{ request.form.get('num3', '') }}">
            </div>
            
            <button type="submit">Calcular</button>
        </form>

        {% if etapas %}
        <div class="resultado">
            <strong>Resposta do servidor:</strong>
            <div>{{ etapas }}</div>
            <div>Resultado: {{ resultados }}</div>
        </div>
        {% endif %}
        
        <br>
        <a href="{{ url_for('index') }}">Limpar / nova conta</a>
    </div>

    <script>
        function atualizarFormulario() {
            const op = document.getElementById("operacao").value;
            const grupoNum2 = document.getElementById("grupo-num2");
            const num2 = document.getElementById("num2");
            const grupoNum3 = document.getElementById("grupo-num3");
            const num3 = document.getElementById("num3");

            if (op === "sqrt") {
                grupoNum2.style.display = "none";
                num2.required = false;
                num2.value = "";
                grupoNum3.style.display = "none";
                num3.required = false;
                num3.value = "";
            } else if (op === "bhaskara") {
                grupoNum2.style.display = "block";
                num2.required = true;
                grupoNum3.style.display = "block";
                num3.required = true;
            } else {
                grupoNum2.style.display = "block";
                num2.required = true;
                grupoNum3.style.display = "none";
                num3.required = false;
                num3.value = "";
            }
        }
        window.onload = atualizarFormulario;
    </script>
</body>
</html>
